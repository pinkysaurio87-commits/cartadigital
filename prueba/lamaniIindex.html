<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>La Manifestación | Menú Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #111827; color: white; font-family: sans-serif; }
        .logo-manifestacion { color: #D50000; font-weight: 900; font-style: italic; text-shadow: 1px 1px 0 #FFF, 2px 2px 0 #000; }
        .acordeon-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .acordeon-content.active { max-height: 2000px; }
    </style>
</head>
<body>
    <nav class="p-4 border-b border-gray-800 bg-gray-900 sticky top-0 z-50">
        <h1 class="logo-manifestacion text-xl text-center uppercase">LA MANIFESTACIÓN</h1>
    </nav>

    <div class="p-4 space-y-4 pb-24">
        <div class="bg-gray-800 border border-gray-700 rounded-2xl overflow-hidden">
            <div onclick="toggle('promos')" class="p-4 flex justify-between items-center cursor-pointer">
                <span class="text-yellow-500 font-black italic">🔥 PROMOCIONES</span>
                <span id="icon-promos">▼</span>
            </div>
            <div id="promos" class="acordeon-content active px-4 pb-4 space-y-2">
                <div class="flex justify-between bg-gray-900 p-3 rounded-xl border border-gray-800">
                    <span class="text-xs font-bold italic uppercase">Combo 3x3 🍔🍺</span>
                    <span class="text-yellow-500 font-black">$549</span>
                </div>
                <div class="flex justify-between bg-gray-900 p-3 rounded-xl border border-gray-800">
                    <span class="text-xs font-bold italic uppercase">Cometodo Buffet</span>
                    <span class="text-yellow-500 font-black">$239</span>
                </div>
            </div>
        </div>

        <div class="bg-gray-800 border border-gray-700 rounded-2xl overflow-hidden">
            <div onclick="toggle('nfl')" class="p-4 flex justify-between items-center cursor-pointer">
                <span class="text-yellow-500 font-black italic">🏈 TERRITORIO COWBOY</span>
                <span id="icon-nfl">▼</span>
            </div>
            <div id="nfl" class="acordeon-content px-4 pb-4">
                <p class="text-[10px] text-gray-400 uppercase font-black italic">Sede CDMX - The Fan House</p>
                <div class="mt-3 flex justify-between bg-gray-900 p-3 rounded-xl border border-gray-800">
                    <span class="text-xs font-bold italic uppercase">Alitas (12 pz) 🍗</span>
                    <span class="text-yellow-500 font-black">$259</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggle(id) {
            const el = document.getElementById(id);
            const icon = document.getElementById('icon-' + id);
            if(el) el.classList.toggle('active');
            if(icon) icon.innerText = el.classList.contains('active') ? '▲' : '▼';
        }
    </script>
</body>
</html>
